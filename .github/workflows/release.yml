name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.18.3

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify npm auth and scope access
        run: |
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT

          cat > "$tmpdir/.npmrc" <<'EOF'
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          EOF

          package_name=$(node -p 'JSON.parse(require("node:fs").readFileSync("packages/openclaw-plugin/package.json", "utf8")).name')
          scope="${package_name#@}"
          scope="${scope%%/*}"
          npm_user=$(NPM_TOKEN="$NPM_TOKEN" npm whoami \
            --userconfig="$tmpdir/.npmrc" \
            --registry=https://registry.npmjs.org/)

          echo "Authenticated npm user: $npm_user"
          npm org ls "$scope" "$npm_user" \
            --userconfig="$tmpdir/.npmrc" \
            --registry=https://registry.npmjs.org/
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run publish-packages
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
